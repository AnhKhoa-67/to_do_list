<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Công Việc Cao Cấp</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode">
    <div id="app">
        <!-- Màn hình Xác thực -->
        <section id="auth-screen" class="screen active">
            <div class="glass-card login-card">
                <h2>Chào Mừng Quay Trở Lại</h2>
                <div id="auth-forms">
                    <form id="login-form">
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="login-email" placeholder="Email" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="login-password" placeholder="Mật khẩu" required>
                        </div>
                        <button type="submit" class="primary-btn">Đăng nhập</button>
                    </form>
                    <p class="toggle-auth">Chưa có tài khoản? <span id="show-register">Đăng ký</span></p>
                </div>
                <div id="register-forms" style="display:none">
                    <form id="register-form">
                         <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="register-email" placeholder="Email" required>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="register-password" placeholder="Mật khẩu" required>
                        </div>
                        <button type="submit" class="primary-btn">Đăng ký</button>
                    </form>
                    <p class="toggle-auth">Đã có tài khoản? <span id="show-login">Đăng nhập</span></p>
                </div>
            </div>
        </section>

        <!-- Dashboard Chính -->
        <section id="dashboard" class="screen">
            <aside class="sidebar glass-sidebar">
                <div class="user-profile">
                    <div class="avatar"><i class="fas fa-user-circle"></i></div>
                    <span id="user-email">Người dùng</span>
                </div>
                <nav>
                    <button class="nav-btn active" data-filter="all"><i class="fas fa-list"></i> Tất cả công việc</button>
                    <button class="nav-btn" data-filter="today"><i class="fas fa-calendar-day"></i> Hôm nay</button>
                    <button class="nav-btn" data-filter="overdue"><i class="fas fa-clock"></i> Quá hạn</button>
                    <button id="logout-btn" class="nav-btn logout"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
                </nav>
            </aside>

            <main class="content">
                <header>
                    <h1 id="view-title">Tất cả công việc</h1>
                    <button id="add-task-btn" class="add-btn"><i class="fas fa-plus"></i> Thêm mới</button>
                </header>

                <div id="todo-list" class="todo-grid">
                    <!-- Tasks will be injected here -->
                </div>
            </main>
        </section>

        <!-- Modal Công việc -->
        <div id="task-modal" class="modal">
            <div class="modal-content glass-card">
                <h3 id="modal-title">Thêm công việc mới</h3>
                <form id="task-form">
                    <input type="hidden" id="task-id">
                    <div class="input-group">
                        <input type="text" id="task-title" placeholder="Bạn cần làm gì?" required>
                    </div>
                    <div class="input-group">
                        <textarea id="task-desc" placeholder="Mô tả chi tiết (tùy chọn)"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label>Hạn chót</label>
                            <input type="datetime-local" id="task-due">
                        </div>
                        <div class="input-group">
                            <label>Thẻ (cách nhau bởi dấu phẩy)</label>
                            <input type="text" id="task-tags" placeholder="quan trọng, công việc...">
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" id="close-modal" class="secondary-btn">Hủy</button>
                        <button type="submit" class="primary-btn">Lưu công việc</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
